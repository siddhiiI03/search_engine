<!DOCTYPE html>
<html>
<head>

<title>Login - Findr</title>

<link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="glow"></div>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">Findr</div>

<div class="nav-links">

<a href="{{ url_for('home') }}">Home</a>

<a href="{{ url_for('about') }}">About</a>

<a href="{{ url_for('signup') }}" class="signup">Sign Up</a>

</div>

</nav>


<!-- LOGIN CARD -->

<div class="login-container">

<div class="login-card">

<h1>Login</h1>

<p class="subtitle">Access your personal workspace.</p>

<form method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="extra">

<a href="{{ url_for('guest') }}">Continue as Guest</a>

<p>
Don't have an account?
<a href="{{ url_for('signup') }}">Sign up here</a>
</p>

</div>

</div>

</div>

</body>
</html>
