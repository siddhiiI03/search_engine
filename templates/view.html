<!DOCTYPE html>
<html>

<head>

<title>{{ file }}</title>

<link rel="stylesheet" href="{{ url_for('static', filename='profile.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;
    background:#fdf6f3;
    text-align:center;
}

.container{
    margin-top:60px;
}

.file-title{
    font-size:28px;
    font-weight:600;
    margin-bottom:30px;
}

.file-content{
    background:#fff;
    padding:30px;
    margin:20px auto;
    width:90%;
    max-width:600px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    text-align:left;
    white-space:pre-wrap;
    line-height:1.8;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:12px 28px;
    background:#ff7a5c;
    color:white;
    border-radius:10px;
    text-decoration:none;
    font-weight:500;
}

.btn:hover{
    background:#ff5c3d;
}

</style>

</head>

<body>

<div class="container">

    <div class="file-title">
        📄 {{ file }}
    </div>

    <div class="file-content">
        {{ content }}
    </div>

    {% if source == "search" %}
        <a href="{{ url_for('search_page') }}" class="btn">← Back</a>
    {% else %}
        <a href="{{ url_for('upload') }}" class="btn">← Back</a>
    {% endif %}

</div>

</body>
</html>
